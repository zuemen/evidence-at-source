topic: Evidence at Source — 產業痛點與既有解法對比
purpose: >
  為 2026 可信 AI 黑客松的痛點論證與差異化定位提供可引用的證據基礎。
  兩個用途：一是支撐 README 與簡報裡的痛點數字（目前只有 86 萬、40%、27% 三個數字，
  且來源未標註）；二是回答評審必問的「既有解法為什麼不夠」。
created: 2026-07-21

fields:
  - name: 痛點陳述
    desc: 這個對象反映的具體問題，一句話
  - name: 量化證據
    desc: 可引用的數字。必須含來源機構、年份、樣本規模
  - name: 資料來源
    desc: URL 或報告全名。無法查證者標記為「待查證」
  - name: 現況做法
    desc: 目前業界／政府如何處理這個問題
  - name: 為何未解決
    desc: 卡在哪裡——技術、誘因、法規、成本
  - name: 與本專案的關係
    desc: 強化痛點／競爭解法／互補標準／可整合對象
  - name: 對評審的用途
    desc: 這條證據可以回答哪一類提問

items:
  # ── A. 痛點證據：移工金融近用 ──────────────────────
  - id: A1
    name: 台灣移工開戶與金融近用障礙
    category: 痛點證據
    note: 驗證 README 現有的「40% 反覆補件」數字來源，補上樣本與年份

  - id: A2
    name: 移工遭詐騙與人頭帳戶問題
    category: 痛點證據
    note: 驗證「27% 曾被詐騙」；補離境後帳戶被冒用的實際案例與規模

  - id: A3
    name: 移工仲介費與債務束縛（debt bondage）
    category: 痛點證據
    note: 台灣與東南亞來源國的收費結構、法定上限、實際超收情形

  - id: A4
    name: 護照與證件遭雇主扣留
    category: 痛點證據
    note: 盛行率調查；這是 RBA 與各國法規的紅線指標

  # ── B. 痛點證據：供應鏈人權稽核 ──────────────────
  - id: B1
    name: RBA VAP 稽核流程與其已知侷限
    category: 痛點證據
    note: 稽核如何進行、頻率、誰付費；工廠選擇性出示的結構性成因

  - id: B2
    name: 社會稽核失效的實證研究與重大失敗案例
    category: 痛點證據
    note: 學術界對社會稽核有效性的批評；通過稽核後仍爆發事故的案例

  - id: B3
    name: 工時紀錄造假（雙套帳）的實際手法
    category: 痛點證據
    note: 直接對應 T4 篡改情境，是本專案最強的技術主張所對應的真實問題

  - id: B4
    name: 稽核疲勞與重複稽核成本
    category: 產業痛點
    note: 同一工廠被多個品牌各自派稽核、各收一次費；產業級的浪費，是「可共用可驗證證據」的直接商業誘因

  - id: B5
    name: 稽核中工人訪談的可信度問題（受指導的工人）
    category: 產業痛點
    note: 工人在雇主監視或事前套招下不敢說實話，使稽核當下的口頭證據本身不可信——凸顯「事件當下封存」的價值

  - id: B6
    name: ESG／人權資料保證缺口與漂綠風險
    category: 產業痛點
    note: 品牌對外揭露的 ESG 數字缺乏第三方保證；投資人與監管對「資料可驗證性」的需求正在升高

  # ── C. 對比：既有解法 ────────────────────────────
  - id: C1
    name: 勞工申訴／發聲平台（Ulula、Issara、Elevate 等）
    category: 競爭解法
    note: 最接近的既有解法。要問：它們解決了發聲，但有解決「證據誰持有」嗎

  - id: C2
    name: 供應鏈盡職調查數位平台（Diginex、EiQ、Sedex 等）
    category: 競爭解法
    note: 資料仍由供應商上傳，關鍵對比點在此

  - id: C3
    name: 區塊鏈供應鏈溯源方案的成敗紀錄
    category: 競爭解法
    note: 評審會問「為何不用區塊鏈」，需要有依據的答案

  - id: C4
    name: SSI／可驗證憑證在勞動與身分場景的既有部署
    category: 競爭解法
    note: EUDI Wallet、各國數位身分皮夾；本專案與它們是互補還是重疊

  - id: C5
    name: 移工專屬金融產品與匯款服務
    category: 競爭解法
    note: 已有業者處理移工金融，但切入點是支付而非證據

  - id: C6
    name: 紙本／PDF 稽核存證 vs 密碼學可驗證憑證
    category: 對比軸
    note: 最基礎的一組對比。紙本可事後重製、無法選擇性揭露、無反簽——逐項對照本專案

  - id: C7
    name: 中央資料庫式勞工資料平台 vs 勞工自持錢包
    category: 對比軸
    note: 政府／NGO 集中持有勞工資料 vs 勞工本人持有。切中「證據誰持有」這個根因

  - id: C8
    name: 移工場景的既有 SSI／申訴數位工具（Diginex Apprise、iRESPOND、ILO 試點）
    category: 競爭解法
    note: 最需要正面比較的一批。要問：它們是否做到勞工自持＋雙簽＋選擇性揭露三者兼具

  - id: C9
    name: eKYC 身分驗證供應商（Onfido、Jumio 等）
    category: 競爭解法
    note: 對比銀行端。它們驗「你是誰」，本專案驗「關於你的事實是否可信」——不同層

  - id: C10
    name: 解法對比矩陣（綜合）
    category: 對比軸
    note: 綜合對象。把 C1–C9 收斂成一張表，欄位為：勞工自持／雙簽反簽／選擇性揭露／防個體查詢／事件當下封存。這張表是簡報差異化頁的直接素材

  # ── D. 標準與法規 ────────────────────────────────
  - id: D1
    name: SD-JWT VC 與 W3C VC 標準現況
    category: 互補標準
    note: 確認選型站得住腳、標準成熟度、誰在採用

  - id: D2
    name: 歐盟 CSDDD 與各國強制人權盡職調查立法
    category: 法規推力
    note: 這是品牌端「為什麼現在必須做」的商業誘因來源

  - id: D3
    name: 台灣移工相關法規與金管會 KYC 要求
    category: 法規約束
    note: 決定銀行端 Agent 的建議在法規上是否可被接受
